<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Interface de Contratos - SmartAgro</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #1e1e1e;
      color: #f1f1f1;
      padding: 20px;
    }
    h1, h2 {
      color: #4CAF50;
    }
    input, button, select, textarea {
      padding: 6px;
      border-radius: 6px;
      border: none;
      margin: 5px 0;
    }
    input[type="file"] {
      background-color: #333;
      color: #ddd;
    }
    button {
      background-color: #4CAF50;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background-color: #45a049;
    }
    .funcao {
      background: #2c2c2c;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    .arg {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .arg label {
      min-width: 120px;
    }
    pre {
      background: #111;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
      height: 300px;
    }
  </style>
</head>
</head>
<body>
    <h1>Interface de Contratos</h1>

    <h2>1️⃣ Envie o contrato Solidity</h2>
    <input type="file" id="contrato" accept=".sol">
    <button onclick="carregarContrato()">Carregar ABI</button>

    <h2>📜 Contratos disponíveis</h2>
    <select id="contratoSelect" onchange="selecionarContrato()"></select>
    <button onclick="atualizarContratos()">🔄 Atualizar lista</button>


    <h2>2️⃣ Funções disponíveis</h2>
    <button id="prefill-btn">Pré-preencher funções</button>
    <div id="funcoes"></div>

    <h2>🧾 Saída / Logs</h2>
    <pre id="log"></pre>

<script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>
<script>
let contratoDeployado = false;
let contratosCarregados = []; // guarda todos os contratos do último upload


async function selecionarContrato() {
 const select = document.getElementById("contratoSelect");
 const nomeContrato = select.value;
 const funcoesDiv = document.getElementById("funcoes");
 funcoesDiv.innerHTML = "<i>Carregando funções...</i>";

 if (!nomeContrato) return;

 // ✅ Busca contrato no array global
 const contrato = contratosCarregados.find(c => c.nome === nomeContrato);
 if (!contrato) {
   funcoesDiv.innerHTML = "<i>Contrato não encontrado.</i>";
   return;
 }

 contratoDeployado = !!contrato.endereco;
 const abi = contrato.abi;

 funcoesDiv.innerHTML = ""; // limpa

 const functions = abi.filter(f => f.type === "function" && !["view","pure"].includes(f.stateMutability));
 if (!functions.length) funcoesDiv.innerHTML = "<i>Nenhuma função mutável disponível.</i>";

 functions.forEach(f => {
   const div = document.createElement("div");
   div.className = "funcao";

   const title = document.createElement("h3");
   title.textContent = `${f.name}(${f.inputs.map(i => i.type).join(", ")})`;
   div.appendChild(title);

   f.inputs.forEach((input, idx) => {
     const argDiv = document.createElement("div");
     argDiv.className = "arg";
     argDiv.innerHTML = `<label>${input.name || "arg" + idx} (${input.type}):</label>
                         <input id="${nomeContrato}_${f.name}_arg${idx}" placeholder="valor..." />`;
     div.appendChild(argDiv);
   });

   const btn = document.createElement("button");
   btn.textContent = "Executar função";
   btn.disabled = !contratoDeployado;
   btn.onclick = () => executarFuncao(nomeContrato, f.name, f.inputs.length);
   div.appendChild(btn);

   funcoesDiv.appendChild(div);
 });
}




async function atualizarContratos() {
  const select = document.getElementById("contratoSelect");
  select.innerHTML = "<option>Carregando...</option>";

  try {
    const res = await fetch("/api/deployed-contracts");
    if (!res.ok) throw new Error("Erro ao buscar contratos.");

    const contratos = await res.json();
    select.innerHTML = "";

    if (!contratos.length) {
      select.innerHTML = "<option>Nenhum contrato encontrado</option>";
      return;
    }

    contratos.forEach(c => {
      const opt = document.createElement("option");
      opt.value = c.name || c.address;
      opt.textContent = `${c.name || "Sem nome"} (${c.address})`;
      select.appendChild(opt);
    });
  } catch (err) {
    select.innerHTML = `<option>❌ Erro: ${err.message}</option>`;
  }
}

// Atualiza a lista automaticamente ao abrir a página
window.addEventListener("DOMContentLoaded", atualizarContratos);

// --- Carregar contrato e ABI ---
// --- Carregar contrato e ABI ---
async function carregarContrato() {
  const funcoesDiv = document.getElementById("funcoes");
  const select = document.getElementById("contratoSelect");
  funcoesDiv.innerHTML = "";
  
  select.innerHTML = "<option>Selecione um contrato...</option>";
  contratosCarregados = [];
  const fileInput = document.getElementById("contrato");
  if (!fileInput.files.length) return alert("Selecione um arquivo Solidity.");

  const formData = new FormData();
  formData.append("contrato", fileInput.files[0]);
  const res = await fetch("/api/load-abi", { method: "POST", body: formData });

  if (!res.ok) {
    document.getElementById("log").textContent = "Erro ao carregar ABI.";
    return;
  }

  const data = await res.json();
  contratosCarregados = data.contratos; // ✅ salva globalmente
 
  const logArea = document.getElementById("log");

  // Verifica se veio o array de contratos
  if (data.contratos && Array.isArray(data.contratos)) {
    logArea.textContent = `✅ ${data.contratos.length} contrato(s) carregado(s):\n`;

    // Itera sobre todos os contratos retornados
    for (const contrato of data.contratos) {
    const { nome, endereco, gas, custosPorRede } = contrato;
    const abi = contrato.abi || data.abi; // ✅ pega o abi certo
  
    logArea.textContent +=
      `\n\n📄 Contrato: ${nome}\n` +
      `🏠 Endereço: ${endereco || "Não disponível"}\n` +
      `⛽ Gas usado no deploy: ${gas || "N/A"}\n`;
  
    // Mostra custos por rede
    if (custosPorRede && Object.keys(custosPorRede).length > 0) {
      logArea.textContent += `🌍 Custos por rede:\n`;
      for (const [token, info] of Object.entries(custosPorRede)) {
        logArea.textContent +=
          `  • ${info.name}: ${info.custoTotalToken} ${info.token}` +
          ` ≈ ${info.custoUSD} / ${info.custoBRL}` +
          ` (gasPrice: ${info.gasPrice})` +
          ` | Cotação: U$${info.cotacao?.usd ?? "N/A"} / R$${info.cotacao?.brl ?? "N/A"}\n`;
      }
    }
  
    // --- 🔹 Criar seções de funções ---
    const contractSection = document.createElement("div");
    contractSection.className = "contrato-section";
    contractSection.innerHTML = `<h2>Funções de ${nome}</h2>`;
    funcoesDiv.appendChild(contractSection);
  
    // 🔸 Protege contra abi ausente
    if (!abi || !Array.isArray(abi)) {
      contractSection.innerHTML += "<i>❌ ABI não encontrada para este contrato.</i>";
      continue;
    }
  
    // 🔹 Filtra funções mutáveis
    const functions = abi.filter(f => f.type === "function" && !["view", "pure"].includes(f.stateMutability));
  
    if (!functions.length) {
      contractSection.innerHTML += "<i>Nenhuma função mutável disponível.</i>";
      continue;
    }
  
    // 🔹 Cria interface para cada função
    functions.forEach(f => {
      const div = document.createElement("div");
      div.className = "funcao";
  
      const title = document.createElement("h3");
      title.textContent = `${f.name}(${f.inputs.map(i => i.type).join(", ")})`;
      div.appendChild(title);
  
      f.inputs.forEach((input, idx) => {
        const argDiv = document.createElement("div");
        argDiv.className = "arg";
        argDiv.innerHTML = `
          <label>${input.name || "arg" + idx} (${input.type}):</label>
          <input id="${nome}_${f.name}_arg${idx}" placeholder="valor..." />
        `;
        div.appendChild(argDiv);
      });
  
      const btn = document.createElement("button");
      btn.textContent = "Executar função";
      btn.disabled = !endereco; // ✅ só desativa se não houver endereço
      btn.onclick = () => executarFuncao(nome, f.name, f.inputs.length);
      div.appendChild(btn);
  
      contractSection.appendChild(div);
    });
  }
  
    
        // 🔹 Atualiza flag global automaticamente
        if (data.contratos.some(c => c.endereco)) {
          contratoDeployado = true;
          console.log("✅ Contrato(s) deployado(s) detectado(s).");
        } else {
          contratoDeployado = false;
          console.warn("⚠️ Nenhum contrato com endereço detectado.");
        }

    atualizarContratos();

  } else {
    console.error("❌ Resposta inesperada:", data);
    logArea.textContent = "❌ Erro: formato de resposta inesperado.";
  }
}

window.carregarContrato = carregarContrato;



// --- Gerar valores fake para cada tipo ---
function fakeValueForType(type, idx, accounts, paramName = "") {
  // 🧠 Normaliza nome do parâmetro para checagens
  const name = paramName.toLowerCase();


  if (type === "address" && (name.includes("owner") || name.includes("manager") || name.includes("admin"))) {
    return accounts[0];
  }
  // 🔍 Detecta padrões de enum pelo nome (ex: updateType, statusType, roleType)
  const isEnum =
    name.includes("type") ||
    name.includes("status") ||
    name.includes("role") ||
    name.includes("state") ||
    (type === "uint8" && name !== "id" && name !== "index");

  // --- Gerar valores conforme o tipo ---
  switch (type) {
    case "string":
      return `fake_string_${idx}`;

    // --- Enums e uint8 ---
    case "uint8":
      return isEnum ? idx % 3 : idx % 255;

    // --- Demais inteiros ---
    case "uint16":
      return (1000 + idx) % 65535;
    case "uint32":
    case "uint64":
    case "uint128":
    case "uint256":
    case "uint":
      return 1000 + idx;

    case "int8":
      return idx % 127;
    case "int16":
      return (1000 + idx) % 32767;
    case "int32":
    case "int64":
    case "int128":
    case "int256":
    case "int":
      return 1000 + idx;

    // --- Endereço ---
    case "address":
      return accounts[idx % accounts.length];

    // --- Booleano ---
    case "bool":
      return idx % 2 === 0;

    // --- Bytes ---
    case "bytes32":
      return ethers.utils.formatBytes32String(`val${idx}`);
    case "bytes":
      return ethers.utils.toUtf8Bytes(`data${idx}`);

    // --- Arrays ---
    case "string[]":
      return [`str1_${idx}`, `str2_${idx}`];
    case "uint256[]":
      return [1 + idx, 2 + idx];
    case "address[]":
      return accounts.slice(0, 2);

    default:
      return "";
  }
}



// --- Botão de pré-preencher funções ---
// --- Botão de pré-preencher funções ---
document.getElementById("prefill-btn").addEventListener("click", async () => {
  if (!contratoDeployado) return alert("Contrato ainda não deployado.");

  // 🔹 Buscar accounts do Hardhat
  let accounts = [];
  try {
    const res = await fetch("/api/accounts");
    accounts = await res.json();
  } catch (err) {
    alert("Não foi possível obter contas do Hardhat. Usando endereço zero.");
  }
  if (!accounts.length) accounts = ["0x0000000000000000000000000000000000000000"];

  const funcoesDiv = document.getElementById("funcoes");

  Array.from(funcoesDiv.children).forEach(funcDiv => {
    const inputs = funcDiv.querySelectorAll("input");

    inputs.forEach((input, idx) => {
      const labelText = input.previousElementSibling.textContent.trim();
      const typeMatch = labelText.match(/\((.+)\)/);
      const nameMatch = labelText.match(/^([\w\d_]+)/);
      const type = typeMatch ? typeMatch[1] : "";
      const paramName = nameMatch ? nameMatch[1] : `param_${idx}`;

      input.value = fakeValueForType(type, idx, accounts, paramName);
    });
  });

  <!--alert("✅ Funções pré-preenchidas com valores de exemplo!");-->
});


// --- Executar função do contrato ---

// --- Executar função de um contrato específico ---
async function executarFuncao(nomeContrato, nomeFuncao, numArgs) {
    const logArea = document.getElementById("log");

    // Lê os argumentos dos campos
    const args = [];
    for (let i = 0; i < numArgs; i++) {
        const campo = document.getElementById(`${nomeContrato}_${nomeFuncao}_arg${i}`);
        args.push(campo ? campo.value : "");
    }

    logArea.textContent += `\n📘 Contrato selecionado: ${nomeContrato}\n`;
    logArea.textContent += `⚙️ Executando ${nomeFuncao}(${args.join(", ")})...\n`;

    try {
        const res = await fetch("/api/execute-function", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ nomeContrato, nomeFuncao, args })
        });

        if (!res.ok) {
            const msg = await res.text();
            logArea.textContent += `\n❌ Erro: ${msg}\n`;
            return;
        }

        const out = await res.json();

        logArea.textContent += `\n✅ Função executada: ${out.funcao}`;
        logArea.textContent += `\n⛽ Gas estimado: ${out.gasEstimado}`;
        logArea.textContent += `\n🔥 Gas real usado: ${out.gasReal}`;

        // Mostrar custos por rede
        if (out.custosPorRede) {
            logArea.textContent += `\n\n🌍 Custos por rede:`;
            for (const [key, info] of Object.entries(out.custosPorRede)) {
                logArea.textContent +=
                    `\n  ${info.name}: ${info.custoTotalToken} ${info.token}` +
                    `  ≈ ${info.custoUSD} / ${info.custoBRL}` +
                    `  (gasPrice: ${info.gasPrice})`;
            }
        }

        logArea.textContent += `\n--------------------------------------------\n`;

    } catch (err) {
        logArea.textContent += `\n❌ Erro inesperado: ${err.message}\n`;
    }
}

</script>
</body>
</html>
