<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Resultados - SmartAgro</title>
<style>
  body { font-family: Arial, sans-serif; margin: 2rem; background: #f9f9f9; }
  table { border-collapse: collapse; width: 100%; }
  th, td { border: 1px solid #ccc; padding: 0.5rem; text-align: left; }
  th { background-color: #eee; }
</style>
</head>
<body>
<h1>Resultados do Banco de Dados</h1>
<table id="resultTable">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nome</th>
      <th>Endereço</th>
      <th>Função</th>
      <th>Gas Usado</th>
      <th>Custo USD</th>
      <th>Custo BRL</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
async function loadResults() {
  try {
    const res = await fetch('/api/results');
    const data = await res.json();

    const tbody = document.querySelector("#resultTable tbody");
    tbody.innerHTML = "";

    data.forEach(row => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${row.id}</td>
        <td>${row.name}</td>
        <td>${row.address}</td>
        <td>${row.function}</td>
        <td>${row.gas_used}</td>
        <td>${row.cost_usd?.toFixed(4) ?? 'N/A'}</td>
        <td>${row.cost_brl?.toFixed(4) ?? 'N/A'}</td>
      `;
      tbody.appendChild(tr);
    });
  } catch(err) {
    console.error(err);
    alert("Erro ao carregar resultados.");
  }
}

loadResults();
</script>
</body>
</html>
